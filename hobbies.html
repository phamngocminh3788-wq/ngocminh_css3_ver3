<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sở thích - Bộ sưu tập hình ảnh</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #fcfcfc;
            color: #333;
        }

        .skip-link {
            position: absolute;
            top: -100px;
            left: 0;
            background: #e67e22;
            color: white;
            padding: 10px 20px;
            z-index: 100;
            text-decoration: none;
            transition: top 0.3s ease;
        }

        .skip-link:focus {
            top: 0;
        }

        .main-nav {
            display: flex;
            background-color: #1a252f;
            padding: 15px 20px;
            justify-content: center;
            list-style: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .main-nav li {
            margin: 0 15px;
        }

        .main-nav a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            padding: 8px 16px;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }

        .main-nav a:hover {
            background-color: #e67e22;
            transform: translateY(-2px);
            display: inline-block;
        }

        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        main h1 {
            margin-bottom: 20px;
            color: #e67e22;
            border-bottom: 2px solid #e67e22;
            padding-bottom: 10px;
        }

        /* YÊU CẦU: Áp dụng thuộc tính Flex cho phân đoạn hình ảnh */
        .flex-gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 25px;
        }

        .gallery-item {
            flex: 1 1 calc(33.333% - 20px);
            min-width: 280px;
            background: #fff;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            text-align: center;
        }

        /* YÊU CẦU: Kiểu hình ảnh Box Model cơ bản */
        .gallery-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border: 3px solid #e67e22;
            padding: 4px;
            background-color: #fff;
            transition: all 0.4s ease;
        }

        /* YÊU CẦU ĐẶC BIỆT: Thực hiện bộ chọn :nth-child để thay đổi bán kính viền xen kẽ */
        /* Các ảnh ở vị trí lẻ (1, 3, 5): Bo tròn góc trên bên trái và dưới bên phải */
        .gallery-item:nth-child(odd) .gallery-img {
            border-radius: 30px 0 30px 0;
        }

        /* Các ảnh ở vị trí chẵn (2, 4): Bo tròn góc trên bên phải và dưới bên trái */
        .gallery-item:nth-child(even) .gallery-img {
            border-radius: 0 30px 0 30px;
        }

        /* Hiệu ứng hover biến đổi nâng cao */
        .gallery-img:hover {
            border-radius: 50% !important;
            transform: rotate(5deg);
        }
    </style>
</head>
<body>

    <a href="#main-content" class="skip-link">Chuyển đến Nội dung chính</a>

    <nav>
        <ul class="main-nav">
            <li><a href="index.html">Trang chủ</a></li>
            <li><a href="hobbies.html">Sở thích (5 Ảnh)</a></li>
            <li><a href="contact.html">Liên hệ</a></li>
        </ul>
    </nav>

    <div class="container">
        <main id="main-content">
            <h1>Không gian Sở thích & Động lực</h1>
            <p>Bên cạnh việc ngồi trước màn hình code, đây là 5 mảnh ghép sở thích giúp mình tái tạo năng lượng mỗi ngày.</p>

            <div class="flex-gallery">
                <div class="gallery-item">
                    <img class="gallery-img" src="https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=500" alt="Sân vận động bóng đá dưới ánh đèn">
                    <p style="margin-top:10px; font-weight:bold;">Bóng đá</p>
                </div>
                <div class="gallery-item">
                    <img class="gallery-img" src="https://images.unsplash.com/photo-1534158914592-062992fbe900?w=500" alt="Vợt bóng bàn và quả bóng trên bàn thi đấu">
                    <p style="margin-top:10px; font-weight:bold;">Bóng bàn</p>
                </div>
                <div class="gallery-item">
                    <img class="gallery-img" src="https://images.unsplash.com/photo-1626224583764-f87db24ac4ea?w=500" alt="Vợt và bóng Pickleball trên sân nhựa ngoài trời">
                    <p style="margin-top:10px; font-weight:bold;">Pickleball</p>
                </div>
                <div class="gallery-item">
                    <img class="gallery-img" src="https://images.unsplash.com/photo-1560684352-8497838a2229?w=500" alt="Khay thức ăn đường phố thơm ngon bắt mắt">
                    <p style="margin-top:10px; font-weight:bold;">Ẩm thực Sài Gòn</p>
                </div>
                <div class="gallery-item">
                    <img class="gallery-img" src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=500" alt="Góc máy tính setup chơi game chiến thuật chuyên nghiệp">
                    <p style="margin-top:10px; font-weight:bold;">Gaming giải trí</p>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
