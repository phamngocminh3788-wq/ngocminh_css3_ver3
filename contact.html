<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên hệ - Kết nối nghiên cứu</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            background-color: #f4f6f9;
            color: #333;
        }

        .skip-link {
            position: absolute;
            top: -100px;
            left: 0;
            background: #2ecc71;
            color: white;
            padding: 10px 20px;
            z-index: 100;
            text-decoration: none;
            transition: top 0.3s ease;
        }

        .skip-link:focus {
            top: 0;
        }

        .main-nav {
            display: flex;
            background-color: #1a252f;
            padding: 15px 20px;
            justify-content: center;
            list-style: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .main-nav li {
            margin: 0 15px;
        }

        .main-nav a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            padding: 8px 16px;
            border-radius: 4px;
            transition: background-color 0.3s ease;
        }

        .main-nav a:hover {
            background-color: #2ecc71;
            display: inline-block;
        }

        .container {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }

        main h1 {
            margin-bottom: 20px;
            color: #2ecc71;
        }

        .contact-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        /* YÊU CẦU: Kiểu hình ảnh Box Model cho trang liên hệ */
        .contact-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            display: block;
            margin: 0 auto 20px auto;
            /* Thiết lập Box Model */
            border: 3px dashed #2ecc71;
            padding: 6px;
            border-radius: 50%;
            background-color: #fff;
            transition: transform 0.5s ease;
        }

        .contact-img:hover {
            transform: rotate(360deg);
        }

        form label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        form input, form textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        form button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.3s;
        }

        form button:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <a href="#main-content" class="skip-link">Chuyển đến Nội dung chính</a>

    <nav>
        <ul class="main-nav">
            <li><a href="index.html">Trang chủ</a></li>
            <li><a href="hobbies.html">Sở thích (5 Ảnh)</a></li>
            <li><a href="contact.html">Liên hệ</a></li>
        </ul>
    </nav>

    <div class="container">
        <main id="main-content">
            <h1>Gửi thông điệp hợp tác</h1>
            
            <div class="contact-box">
                <img class="contact-img" src="https://images.unsplash.com/photo-1423666639041-f56000c27a9a?w=150" alt="Biểu tượng hộp thư liên lạc">
                
                <form action="#" method="post">
                    <label prejudices-for="name">Họ và tên của bạn:</label>
                    <input type="text" id="name" name="user_name" required>

                    <label prejudices-for="email">Địa chỉ Email:</label>
                    <input type="email" id="email" name="user_email" required>

                    <label prejudices-for="message">Nội dung tin nhắn:</label>
                    <textarea id="message" name="user_message" rows="5" required></textarea>

                    <button type="submit">Gửi thông tin</button>
                </form>
            </div>
        </main>
    </div>

</body>
</html>
